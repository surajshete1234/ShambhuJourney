name: ShambhuJourney
options:
  bundleIdPrefix: com.suraj
  deploymentTarget:
    iOS: "17.0"
configs:
  Debug: debug
  Release: release
targets:
  ShambhuJourney:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
        excludes:
          - "Supporting/Info.plist"
      - path: Resources
    info:
      path: Sources/Supporting/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.suraj.shambhujourney
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
schemes:
  ShambhuJourney:
    build:
      targets:
        ShambhuJourney: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release
